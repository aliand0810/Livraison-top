<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" id="meta-theme" content="#5d4037">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<title>Livraison Pro</title>
<style>
/* ══ RESET & VARIABLES ══ */
:root {
  --p:#5d4037; --pm:#8d6e63; --pl:#d7ccc8; --pd:#3e2723;
  --bg:#faf7f2; --card:#fff; --txt:#4a3728;
  --g:#388e3c; --o:#f57c00; --r:#c62828; --b:#1565c0;
  --sh:0 2px 12px rgba(93,64,55,.12); --sh2:0 6px 28px rgba(93,64,55,.18);
  --rad:12px; --tabH:56px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; font-family:'Nunito',sans-serif; }
body { background:var(--bg); color:var(--txt); }

/* ══ TABS (Navigation) ══ */
.tabs { display:flex; background:var(--pd); position:fixed; top:0; left:0; right:0; height:var(--tabH); z-index:950; box-shadow:0 2px 10px rgba(0,0,0,.3); }
.tbtn { flex:1; border:none; background:transparent; color:rgba(255,255,255,.5); cursor:pointer; border-bottom:3px solid transparent; transition:all .2s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
.tbtn .ti { font-size:20px; line-height:1; }
.tbtn .tl { font-size:10px; text-transform:uppercase; font-weight:800; }
.tbtn.active { color:#fff; border-bottom-color:#ff8f00; background:rgba(255,255,255,.1); }

/* ══ PAGES ══ */
.page { display:none; margin-top:var(--tabH); min-height:calc(100dvh - var(--tabH)); padding-bottom:140px; }
.page.active { display:block; }
#pg-carte { padding-bottom: 0; }

/* ══ LISTE CLIENTS ══ */
.lp { max-width:700px; margin:auto; padding:14px 12px 0; }
.sechd { display:flex; align-items:center; gap:8px; font-size:14px; font-weight:900; color:var(--p); margin:16px 0 10px; }
.bbl { background:var(--pm); color:#fff; font-size:11px; border-radius:12px; padding:3px 10px; }

/* Cartes Clients Mobile (Unifiées) */
.crd { background:var(--card); border-radius:var(--rad); box-shadow:var(--sh); margin-bottom:12px; overflow:hidden; border-left:4px solid var(--g); }
.crd.unpaid { border-left-color:var(--o); }
.crd-h { display:flex; align-items:center; padding:12px 14px; gap:10px; border-bottom:1px solid #f5ede8; }
.crd-n { flex:1; min-width:0; }
.crd-n strong { font-size:15px; font-weight:900; color:var(--pd); display:block; }
.crd-sub { font-size:12px; color:#888; margin-top:4px; display:flex; gap:8px; flex-wrap:wrap; }
.crd-a { display:flex; gap:8px; padding:10px 14px; background:#faf7f2; }
.crd-a button { flex:1; padding:10px 5px; border-radius:20px; border:none; font-size:11px; font-weight:900; cursor:pointer; }
.crd-b2 { display:flex; gap:8px; padding:0 14px 12px; }
.crd-b2 button { flex:1; padding:8px; border-radius:8px; border:none; font-size:12px; font-weight:800; background:#f0ebe6; cursor:pointer; }
.todo { background:#ffccbc; color:#bf360c; }
.done { background:#c8e6c9; color:#2e7d32; }
.wait { background:#ffe0b2; color:#e65100; }
.paid { background:#c8e6c9; color:#2e7d32; }

/* Masquage des éléments privés */
.pc.hidden { display:none !important; filter: blur(4px); }
.pc.blurred { filter: blur(5px); opacity: 0.6; pointer-events: none; }

/* ══ BULLES LATÉRALES (Clients, Articles, Réglages) ══ */
.fbubble {
  position:fixed; bottom:90px; z-index:901; 
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  width:60px; height:60px; border-radius:20px; box-shadow:0 4px 15px rgba(0,0,0,.4);
  color:white; transition:transform 0.2s; cursor:pointer;
}
.fbubble:active { transform:scale(0.9); }
.fbubble-val { font-size:18px; font-weight:900; line-height:1; }
.fbubble-lbl { font-size:9px; font-weight:800; text-transform:uppercase; margin-top:2px; opacity:0.8; }
.fb-clients { left:15px; background:linear-gradient(135deg,#5d4037,#8d6e63); }
.fb-articles { left:85px; background:linear-gradient(135deg,#4a3728,#7d5c4d); }
.fb-cfg { right:15px; background:linear-gradient(135deg,#37474f,#546e7a); font-size:26px; }

/* ══ FOOTER (Bande en bas) ══ */
.footer { position:fixed; bottom:0; left:0; right:0; z-index:900; pointer-events:none; }
.fstrip { background:var(--pd); pointer-events:auto; box-shadow:0 -4px 20px rgba(0,0,0,.4); border-radius:20px 20px 0 0; transition:max-height 0.3s ease; max-height:150px; overflow:hidden; }
.fstrip.collapsed { max-height:20px; }
.ftap { height:20px; background:rgba(255,255,255,.05); cursor:pointer; display:flex; align-items:center; justify-content:center; }
.ftap::after { content:''; display:block; width:40px; height:4px; background:rgba(255,255,255,.4); border-radius:4px; }
.fstrip-inner { display:flex; justify-content:center; gap:8px; padding:10px 15px 20px; flex-wrap:wrap; }
.fchip { display:flex; flex-direction:column; align-items:center; padding:8px 12px; background:rgba(255,255,255,.1); border-radius:12px; }
.fchip-val { font-size:15px; font-weight:900; color:#fff; }
.fchip-lbl { font-size:9px; font-weight:700; color:rgba(255,255,255,.6); text-transform:uppercase; margin-top:3px; }

/* ══ CARTE ET MODES DE DÉPLACEMENT ══ */
#map { position:absolute; inset:0; }
.mtop { position:absolute; top:10px; left:10px; right:10px; z-index:500; display:flex; gap:8px; pointer-events:none; }
.mtop > * { pointer-events:auto; }
.minfo { background:#fff; border-radius:12px; padding:10px 14px; box-shadow:var(--sh2); font-size:13px; font-weight:700; flex:1; border-left:4px solid var(--p); }
.mbtn { background:#fff; border:none; border-radius:10px; padding:10px 12px; font-size:13px; font-weight:900; cursor:pointer; box-shadow:var(--sh2); }

/* Boutons Modes de transport sur la carte */
.tmode-bar { position:absolute; top:70px; right:10px; z-index:500; display:flex; flex-direction:column; gap:8px; pointer-events:auto; }
.tmode-btn { width:45px; height:45px; border-radius:12px; border:none; background:#fff; box-shadow:var(--sh2); font-size:22px; cursor:pointer; transition:0.2s; opacity:0.7; }
.tmode-btn.active { background:var(--p); opacity:1; transform:scale(1.1); box-shadow:0 4px 15px rgba(93,64,55,.5); }

/* Feuille de route OSRM */
.rpan { position:absolute; bottom:10px; left:10px; right:10px; z-index:500; background:#fff; border-radius:16px; box-shadow:var(--sh2); max-height:40vh; overflow-y:auto; display:none; }
.rpan.on { display:block; }
.rh { position:sticky; top:0; background:var(--p); color:#fff; padding:12px 15px; display:flex; justify-content:space-between; font-weight:900; font-size:14px; border-radius:16px 16px 0 0; }
.rstp { display:flex; align-items:center; gap:10px; padding:12px 15px; border-bottom:1px solid #f5ede8; font-size:13px; }

/* ══ MODAL RÉGLAGES ══ */
.qset-ov { position:fixed; inset:0; z-index:1100; background:rgba(0,0,0,.6); display:none; align-items:flex-end; }
.qset-ov.on { display:flex; }
.qset-pan { background:#fff; width:100%; border-radius:24px 24px 0 0; padding:20px; transform:translateY(100%); transition:0.3s; }
.qset-ov.on .qset-pan { transform:translateY(0); }
.qset-row { display:flex; justify-content:space-between; align-items:center; padding:15px; background:#faf7f2; border-radius:12px; margin-bottom:10px; }

/* ══ FAB AJOUT CLIENT ══ */
.fab { position:fixed; right:20px; bottom:160px; z-index:850; width:65px; height:65px; border-radius:50%; background:var(--o); color:#fff; border:none; cursor:pointer; box-shadow:0 5px 20px rgba(245,124,0,.4); display:flex; align-items:center; justify-content:center; font-size:30px; }

/* ══ SAISIE ══ */
.saisie-ov { position:fixed; inset:0; z-index:1200; background:rgba(0,0,0,.5); display:none; }
.saisie-ov.on { display:block; }
.saisie-pan { position:fixed; bottom:0; left:0; right:0; z-index:1210; background:#fff; border-radius:24px 24px 0 0; padding:20px; transform:translateY(100%); transition:0.3s; }
.saisie-pan.open { transform:translateY(0); }
.s-inp { width:100%; padding:14px; border:2px solid var(--pl); border-radius:12px; font-size:15px; margin-bottom:10px; font-weight:700; }
.btn-add { width:100%; padding:16px; background:var(--p); color:#fff; border:none; border-radius:12px; font-size:16px; font-weight:900; margin-top:10px; }

/* Toast */
#toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--pd); color:#fff; padding:12px 24px; border-radius:30px; font-weight:800; z-index:9999; display:none; box-shadow:var(--sh2); }
#toast.show { display:block; animation:fade 2.5s; }
@keyframes fade { 0%{opacity:0; top:0;} 10%{opacity:1; top:20px;} 90%{opacity:1; top:20px;} 100%{opacity:0; top:0;} }
</style>
</head>
<body>

<div class="tabs">
  <button class="tbtn active" onclick="goTab('liste')" id="tab-liste"><span class="ti">📋</span><span class="tl">Liste</span></button>
  <button class="tbtn" onclick="goTab('carte')" id="tab-carte"><span class="ti">🗺️</span><span class="tl">Carte</span></button>
</div>
<div id="toast"></div>

<div class="page active" id="pg-liste">
  <div class="lp">
    <div class="sechd">🚚 À Livrer</div>
    <div id="cw-aliv"></div>
    <div class="sechd">✅ Livrés</div>
    <div id="cw-done"></div>
  </div>
</div>

<div class="fbubble fb-clients">
  <span class="fbubble-val" id="nb-cl">0</span>
  <span class="fbubble-lbl">Clients</span>
</div>
<div class="fbubble fb-articles">
  <span class="fbubble-val" id="nb-art">0</span>
  <span class="fbubble-lbl">Colis</span>
</div>
<div class="fbubble fb-cfg" onclick="document.getElementById('qset-ov').classList.add('on')">
  ⚙️
</div>

<div class="footer">
  <div class="fstrip" id="fstrip">
    <div class="ftap" onclick="toggleFStrip()"></div>
    <div class="fstrip-inner">
      <div class="fchip pc"><span class="fchip-val" id="s-ach">0€</span><span class="fchip-lbl">Achat</span></div>
      <div class="fchip pc"><span class="fchip-val" id="s-ven">0€</span><span class="fchip-lbl">Vente</span></div>
      <div class="fchip pc" style="background:rgba(100,200,100,.2);"><span class="fchip-val" style="color:#a5d6a7;" id="s-ben">0€</span><span class="fchip-lbl">Bénéfice</span></div>
      <div class="fchip"><span class="fchip-val" id="b-aliv-f">0</span><span class="fchip-lbl">À Livrer</span></div>
      <div class="fchip"><span class="fchip-val" id="b-done-f">0</span><span class="fchip-lbl">Livrés</span></div>
    </div>
  </div>
</div>

<div class="qset-ov" id="qset-ov" onclick="if(event.target===this) this.classList.remove('on')">
  <div class="qset-pan">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <h2>⚙️ Réglages</h2>
      <button onclick="document.getElementById('qset-ov').classList.remove('on')" style="background:none;border:none;font-size:24px;">✕</button>
    </div>
    
    <div class="qset-row">
      <div>
        <strong style="display:block;">👁️ Afficher les prix (Confidentialité)</strong>
        <span style="font-size:11px;color:#888;">Masque les finances en public</span>
      </div>
      <input type="checkbox" id="ckP" onchange="togglePrices()" style="width:24px;height:24px;accent-color:var(--p);">
    </div>
    <div class="qset-row">
      <div>
        <strong style="display:block;">🗑️ Vider la liste</strong>
      </div>
      <button onclick="clearList()" style="padding:10px 15px; background:var(--r); color:white; border:none; border-radius:8px; font-weight:bold;">Réinitialiser</button>
    </div>
  </div>
</div>

<div class="page" id="pg-carte">
  <div id="map"></div>
  <div class="mtop">
    <div class="minfo" id="minfo">📍 Appuyez sur Placer ou Route.</div>
    <button class="mbtn" onclick="startPlace()">📍 Placer</button>
    <button class="mbtn" onclick="calcRoute()" style="background:var(--p);color:white;">🗺️ Route</button>
  </div>
  
  <div class="tmode-bar">
    <button class="tmode-btn active" id="tm-driving" onclick="setTransport('driving')" title="Voiture">🚗</button>
    <button class="tmode-btn" id="tm-scooter" onclick="setTransport('scooter')" title="Trottinette">🛴</button>
    <button class="tmode-btn" id="tm-cycling" onclick="setTransport('cycling')" title="Vélo">🚴</button>
    <button class="tmode-btn" id="tm-foot" onclick="setTransport('foot')" title="Piéton">🚶</button>
  </div>

  <div class="rpan" id="rpan">
    <div class="rh">🗺️ Itinéraire <button style="background:none;border:none;color:#fff;font-size:22px;" onclick="document.getElementById('rpan').classList.remove('on');if(rLG)rLG.clearLayers();">✕</button></div>
    <div id="rsteps"></div>
  </div>
</div>

<button class="fab" id="main-fab" onclick="openSaisie()">➕</button>

<div class="saisie-ov" id="saisie-ov" onclick="closeSaisie()"></div>
<div class="saisie-pan" id="saisie-pan">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
    <h2>✏️ Nouveau Client</h2>
    <button onclick="closeSaisie()" style="background:none;border:none;font-size:24px;">✕</button>
  </div>
  <input type="text" id="i-nom" placeholder="Nom du client *" class="s-inp">
  <input type="tel" id="i-tel" placeholder="📞 Téléphone" class="s-inp">
  <div style="display:flex;gap:10px;">
    <input type="number" id="i-qte" placeholder="Quantité" value="1" min="1" class="s-inp">
    <input type="number" id="i-prix" placeholder="Prix Vente (€)" value="5" class="s-inp">
  </div>
  <button onclick="saveClient()" class="btn-add">✅ Enregistrer</button>
</div>

<script>
// --- DONNÉES & SÉCURITÉ ---
const esc = s => (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
let livs = JSON.parse(localStorage.getItem('livpro_d')) || [];
let config = JSON.parse(localStorage.getItem('livpro_c')) || { showPrices: false, transport: 'driving' };
const saveD = () => localStorage.setItem('livpro_d', JSON.stringify(livs));
const saveC = () => localStorage.setItem('livpro_c', JSON.stringify(config));

// --- NAVIGATION ---
function goTab(tab){
  document.querySelectorAll('.tbtn, .page').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('pg-'+tab).classList.add('active');
  if(tab === 'carte') {
    if(!lmap) initMap();
    setTimeout(() => lmap.invalidateSize(), 100);
  }
}

// --- FORMULAIRE UNIFIÉ ---
function openSaisie() {
  document.getElementById('saisie-pan').classList.add('open');
  document.getElementById('saisie-ov').classList.add('on');
}
function closeSaisie() {
  document.getElementById('saisie-pan').classList.remove('open');
  document.getElementById('saisie-ov').classList.remove('on');
  document.getElementById('i-nom').value = '';
  document.getElementById('i-tel').value = '';
}
function saveClient() {
  const nom = document.getElementById('i-nom').value.trim();
  if(!nom) return alert("Le nom est obligatoire !");
  livs.push({
    nom: nom,
    tel: document.getElementById('i-tel').value || '—',
    qte: parseInt(document.getElementById('i-qte').value) || 1,
    prix: parseFloat(document.getElementById('i-prix').value) || 0,
    livre: false, paye: true, coords: null
  });
  saveD(); renderTable(); closeSaisie(); toast("Client ajouté !");
  if(lmap) refreshMarkers();
}

// --- RENDU ET BULLES ---
function renderTable() {
  const ca = document.getElementById('cw-aliv');
  const cd = document.getElementById('cw-done');
  ca.innerHTML = ''; cd.innerHTML = '';
  let nbLiv = 0, nbDone = 0, tArt = 0, tAchat = 0, tVente = 0;

  livs.forEach((item, i) => {
    tArt += item.qte;
    const achat = item.qte * 2; // Prix d'achat fixe à 2€ pour l'exemple
    const vente = item.qte * item.prix;
    if(item.paye) { tAchat += achat; tVente += vente; }
    item.livre ? nbDone++ : nbLiv++;

    const div = document.createElement('div');
    div.className = `crd ${item.paye?'':'unpaid'}`;
    div.innerHTML = `
      <div class="crd-h">
        <div class="crd-n">
          <strong>${esc(item.nom)}</strong>
          <div class="crd-sub">📞 ${esc(item.tel)} &nbsp; | &nbsp; 📦 ×${item.qte}</div>
          <div class="pc" style="margin-top:5px; font-weight:800; color:var(--p)">Prix: ${vente}€ (Bénéf: ${vente-achat}€)</div>
        </div>
      </div>
      <div class="crd-a">
        <button class="${item.livre?'done':'todo'}" onclick="tLiv(${i})">${item.livre?'✅ LIVRÉ':'🚚 À LIVRER'}</button>
        <button class="${item.paye?'paid':'wait'}" onclick="tPay(${i})">${item.paye?'💚 PAYÉ':'🟠 ATTENTE'}</button>
      </div>
      <div class="crd-b2">
        <button onclick="goTab('carte');setTimeout(()=>startPlace(${i}),200)">${item.coords?'📍 Déplacer':'➕ Carte'}</button>
        <button onclick="if(confirm('Supprimer ?')){livs.splice(${i},1);saveD();renderTable();refreshMarkers();}" style="background:#ffebee;color:#c62828">🗑️</button>
      </div>
    `;
    (item.livre ? cd : ca).appendChild(div);
  });

  // Mise à jour des Bulles latérales
  document.getElementById('nb-cl').textContent = livs.length;
  document.getElementById('nb-art').textContent = tArt;

  // Mise à jour du Footer
  document.getElementById('b-aliv-f').textContent = nbLiv;
  document.getElementById('b-done-f').textContent = nbDone;
  document.getElementById('s-ach').textContent = tAchat + '€';
  document.getElementById('s-ven').textContent = tVente + '€';
  document.getElementById('s-ben').textContent = (tVente - tAchat) + '€';

  applyPrivacy();
}

function tLiv(i) { livs[i].livre = !livs[i].livre; saveD(); renderTable(); if(lmap)refreshMarkers(); }
function tPay(i) { livs[i].paye = !livs[i].paye; saveD(); renderTable(); }
function clearList() { if(confirm("Tout effacer ?")){ livs=[]; saveD(); renderTable(); if(lmap)refreshMarkers(); document.getElementById('qset-ov').classList.remove('on'); } }

// --- CONFIDENTIALITÉ & FOOTER ---
function toggleFStrip() { document.getElementById('fstrip').classList.toggle('collapsed'); }
function togglePrices() { config.showPrices = document.getElementById('ckP').checked; saveC(); applyPrivacy(); }
function applyPrivacy() {
  document.getElementById('ckP').checked = config.showPrices;
  const elements = document.querySelectorAll('.pc');
  elements.forEach(el => {
    if(config.showPrices) {
      el.classList.remove('blurred');
      el.classList.add('vis');
    } else {
      el.classList.add('blurred');
      el.classList.remove('vis');
    }
  });
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// --- CARTE & OSRM ROUTING ---
let lmap = null, mLG = null, rLG = null, placingIdx = null;

// Table de correspondance API OSRM
const OSRM_PROFILES = {
  driving: 'driving', 
  scooter: 'bike',  // OSRM n'a pas "scooter", on utilise bike (pistes cyclables)
  cycling: 'bike', 
  foot: 'foot'
};

function initMap() {
  if(lmap) return;
  lmap = L.map('map', {zoomControl: false}).setView([48.8566, 2.3522], 12); // Paris défaut
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(lmap);
  mLG = L.layerGroup().addTo(lmap);
  rLG = L.layerGroup().addTo(lmap);

  // Géolocalisation initiale
  if(navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(p => {
      lmap.setView([p.coords.latitude, p.coords.longitude], 14);
      L.circleMarker([p.coords.latitude, p.coords.longitude], {color:'blue'}).addTo(lmap);
    });
  }

  lmap.on('click', e => {
    if(placingIdx === null) return;
    livs[placingIdx].coords = { lat: e.latlng.lat, lng: e.latlng.lng };
    saveD(); renderTable(); refreshMarkers();
    placingIdx = null;
    document.getElementById('minfo').innerHTML = '📍 Position enregistrée.';
    lmap.getContainer().style.cursor = '';
  });

  setTransport(config.transport);
  refreshMarkers();
}

function refreshMarkers() {
  if(!mLG) return;
  mLG.clearLayers();
  livs.forEach((l, i) => {
    if(!l.coords) return;
    const color = l.livre ? '#388e3c' : '#f57c00';
    const m = L.circleMarker([l.coords.lat, l.coords.lng], { radius: 10, fillColor: color, color: '#fff', weight: 2, fillOpacity: 1 }).addTo(mLG);
    m.bindTooltip(`<b>${esc(l.nom)}</b><br>${l.livre?'Livré':'À livrer'}`, {permanent:false, direction:'top'});
  });
}

function startPlace(idx) {
  if(idx === undefined || idx === null) return toast("Choisissez un client depuis la liste");
  placingIdx = idx;
  document.getElementById('minfo').innerHTML = `🖱️ Cliquez sur la carte pour placer <b>${esc(livs[idx].nom)}</b>`;
  lmap.getContainer().style.cursor = 'crosshair';
}

function setTransport(mode) {
  config.transport = mode; saveC();
  ['driving','scooter','cycling','foot'].forEach(m => {
    document.getElementById('tm-'+m).classList.toggle('active', m === mode);
  });
}

async function calcRoute() {
  const wc = livs.filter(l => l.coords && !l.livre);
  if(!wc.length) return toast("Aucun client (non livré) localisé sur la carte.");

  document.getElementById('minfo').innerHTML = '⏳ Calcul en cours...';
  
  // Point de départ: position actuelle, sinon le premier client
  let start = wc[0].coords;
  try {
    const p = await new Promise((ok, err) => navigator.geolocation.getCurrentPosition(ok, err, {timeout:4000}));
    start = {lat: p.coords.latitude, lng: p.coords.longitude};
  } catch(e) {}

  const profile = OSRM_PROFILES[config.transport] || 'driving';
  const coords = [start, ...wc.map(l => l.coords)].map(c => `${c.lng},${c.lat}`).join(';');
  const url = `https://router.project-osrm.org/route/v1/${profile}/${coords}?overview=full&geometries=geojson`;

  try {
    const res = await fetch(url);
    const data = await res.json();
    
    if(!data.routes || !data.routes.length) throw new Error();
    
    const rt = data.routes[0];
    rLG.clearLayers();
    
    // Dessiner le chemin
    L.geoJSON(rt.geometry, {style: {color: '#1565c0', weight: 5, opacity: 0.8}}).addTo(rLG);
    lmap.fitBounds(L.geoJSON(rt.geometry).getBounds(), {padding: [50, 50]});

    // Numéroter les arrêts
    wc.forEach((l, i) => {
      const svg = `<svg width="24" height="24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10" fill="red" stroke="white" stroke-width="2"/><text x="12" y="16" font-size="12" font-weight="bold" fill="white" text-anchor="middle">${i+1}</text></svg>`;
      L.marker([l.coords.lat, l.coords.lng], {icon: L.divIcon({html: svg, className:''})}).addTo(rLG);
    });

    const dist = (rt.distance / 1000).toFixed(1);
    const time = Math.round(rt.duration / 60);
    const modeEmoji = {driving:'🚗 Voiture', scooter:'🛴 Trott.', cycling:'🚴 Vélo', foot:'🚶 Piéton'}[config.transport];
    
    document.getElementById('minfo').innerHTML = `<b>${dist} km</b> · <b>${time} min</b> en ${modeEmoji}`;
    
    // Panneau d'itinéraire
    document.getElementById('rsteps').innerHTML = wc.map((l, i) => `
      <div class="rstp">
        <div style="background:red;color:white;border-radius:50%;width:20px;height:20px;text-align:center;font-weight:bold;line-height:20px;">${i+1}</div>
        <div><b>${esc(l.nom)}</b><br><span style="color:#777;font-size:11px;">${esc(l.tel)}</span></div>
      </div>
    `).join('');
    document.getElementById('rpan').classList.add('on');

  } catch (e) {
    document.getElementById('minfo').innerHTML = '❌ Erreur de calcul';
    toast("Impossible de tracer l'itinéraire.");
  }
}

// INITIALISATION
window.onload = () => {
  renderTable();
  applyPrivacy();
  document.getElementById('fstrip').classList.remove('collapsed'); // Ouvert par défaut au lancement
};
</script>
